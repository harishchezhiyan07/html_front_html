<!DOCTYPE html>
<html>
<head>
    <title>Athletis</title>

    <style>
        body{
            font-family: Arial, sans-serif;
        }

        header{
            text-align: center;
            margin-bottom: 20px;
        }

        form{
            width: 700px;
            margin: auto;
            border: 2px solid black;
            padding: 20px;
            border-radius: 10px;
        }

        .form-group{
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label{
            width: 150px;
            font-weight: bold;
        }

        .form-group input{
            width: 200px;
            padding: 5px;
            margin-right: 20px;
        }

        .radio-group,
        .checkbox-group{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .submit-btn{
            text-align: center;
        }

        input[type="submit"]{
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<header>
    <img src="../asserts/image/athletics/logo.png"
         alt="logo"
         width="200"
         height="100">

    <h2>ATHLETIS REGISTRATION</h2>
</header>

<section>

<form>

    <div class="form-group">
        <label>First Name:</label>
        <input type="text" placeholder="Enter first name" required>

        <label>Last Name:</label>
        <input type="text" placeholder="Enter last name" required>
    </div>

    <div class="form-group">
        <label>Age:</label>
        <input type="number" placeholder="Enter age" required>

        <label>Date of Birth:</label>
        <input type="date" required>
    </div>

    <div class="form-group">
        <label>Father Name:</label>
        <input type="text" placeholder="Enter father name" required>

        <label>Mother Name:</label>
        <input type="text" placeholder="Enter mother name" required>
    </div>

    <div class="form-group">
        <label>Phone Number:</label>
        <input type="tel" placeholder="Enter phone number" required>

        <label>Gender:</label>

        <div class="radio-group">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>
    </div>

    <div class="form-group">
        <label>Aadhar Number:</label>
        <input type="text" placeholder="Enter Aadhar number" required>

        <label>Location:</label>
        <input type="text" placeholder="Enter location" required>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" placeholder="Enter email" required>

        <label>Password:</label>
        <input type="password" placeholder="Enter password" required>
    </div>

    <div class="form-group">
        <label>Event:</label>

        <div class="checkbox-group">
            <input type="checkbox"> Sprint Event
            <input type="checkbox"> Long Event
            <input type="checkbox"> Field Event
        </div>
    </div>

    <div class="submit-btn">
        <input type="submit" value="Submit">
    </div>

</form>

</section>

</body>
</html>
