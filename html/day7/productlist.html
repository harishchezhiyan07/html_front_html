<html>
    <head>
        <title>Product list</title>

    </head>
    <body>
        <header>
           
            <center><strong>PRODUCT LIST</strong></center>
        </header><br></br>

        <section>
            <div>
                <form>
                    <label for="product name">Product name : </label>
                    <input type="text" placeholder="product name"><br><br>
                    <label for="product category">Product category : </label>
                   
                   <select name="product list">
                     <option value="" disabled selected>Select a product</option>
                   <option value="tshirt">T-Shirt</option>
                   <option value="jeans">Jeans</option>
                     <option value="shoes">Shoes</option>
                        <option value="watch">Watch</option>
                   </select>

                    <br></br>
                    <label for="price">Price : </label>
                    <input type="number" min="500" placeholder="price"><br><br>
                    <label for="quantity">Quantity : </label>
                    <input type="number" min="1" placeholder="quantity"><br><br>
                    <center>
                        <image src="../asserts/image/athletics/dress.jpg" alt="Dress" width="300" height="200">
                        </image>
                    </center>
                    <label for="City">City : </label>
                    <input type="checkbox" name="city"/>Chennai
                    <input type="checkbox" name="city"/>Bangalore
                    <input type="checkbox" name="city"/>Hyderabad
                    <input type="checkbox" name="city"/>Mumbai<br><br>
                    <label for="gender">Gender</label>
                    <input type="radio" name="gender" value="male"/>Male
                    <input type="radio" name="gender" value="female"/>Female
                    <br></br>
                    <label for="quality">Quality</label>
                    <input type="radio" name="quality" value="high"/>High
                    <input type="radio" name="quality" value="medium"/>Medium
                    <input type="radio" name="quality" value="low"/>Low
                    <br></br>
                    
                    <label for="product licence">Product Licence</label>
                    <input type="text" name="product licence" placeholder="Product Licence">




            
                </form>
            </div>
        </section>
    </body>
</html>
