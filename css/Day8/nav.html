<!DOCTYPE html>
<html lang="en">

    <title>Dashboard</title>
    <link rel="stylesheet" href="../Assert/Css/nav.css">
</head>
<body>

    <div class="card-content">
      <h3>Revenue Analysis</h3>
      <p>Detailed breakdown of monthly earnings and projections.</p>
      <button class="btn-action">View Report</button>
    </div>
  </article>

  <!-- Card 2 -->

      <p>Tracking active sessions and retention rates across platforms.</p>

    </div>
  </article>

  <!-- Card 3 -->
  <article class="card">
    <div class="card-content">
      <h3>System Health</h3>
      <p>Real-time monitoring of server loads and uptime status.</p>
      <button class="btn-action">Check Status</button>
    </div>
  </article>
</div>
