<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="flex min-h-screen">
  <div class="w-64 bg-gray-800 text-white p-5">
    <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>

    <ul class="space-y-4">
      <li>Dashboard</li>
      <li>Users</li>
      <li>Courses</li>
      <li>Reports</li>
      <li>Settings</li>
    </ul>
  </div>
  <div class="flex-1 p-6 bg-gray-100">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

      <div class="bg-white p-5 rounded shadow">
        <h3>Total Users</h3>
        <p class="text-3xl font-bold">1500</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <h3>Courses</h3>
        <p class="text-3xl font-bold">45</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <h3>Revenue</h3>
        <p class="text-3xl font-bold">₹50K</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <h3>Reports</h3>
        <p class="text-3xl font-bold">25</p>
      </div>

    </div>
    <div class="bg-white p-5 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Recent Users</h2>

      <table class="w-full border">
        <tr class="bg-gray-200">
          <th class="p-2">Name</th>
          <th class="p-2">Email</th>
          <th class="p-2">Status</th>
        </tr>

        <tr>
          <td class="p-2">John</td>
          <td class="p-2">john@gmail.com</td>
          <td class="p-2">Active</td>
        </tr>

        <tr>
          <td class="p-2">Mike</td>
          <td class="p-2">mike@gmail.com</td>
          <td class="p-2">Active</td>
        </tr>
      </table>

    </div>

  </div>

</div>

</body>
</html>
